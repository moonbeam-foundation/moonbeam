name: Cargo build
description: |
  Builds moonbeam with given features.
  Stores the result in "build/moonbeam" and the runtimes in "runtimes/"

inputs:
  features:
    description: features to include in the build (comma separated)
    required: false
  blacksmith-sticky-sccache:
    description: use a Blacksmith sticky disk for the local sccache directory
    required: false
    default: "false"
  blacksmith-sticky-sccache-key:
    description: Blacksmith sticky disk key for the local sccache directory
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Validate Blacksmith sccache key
      if: ${{ inputs.blacksmith-sticky-sccache == 'true' && inputs.blacksmith-sticky-sccache-key == '' }}
      shell: bash
      run: |
        echo "blacksmith-sticky-sccache-key is required when blacksmith-sticky-sccache is true" >&2
        exit 1
    - name: Mount Blacksmith sccache disk
      if: ${{ inputs.blacksmith-sticky-sccache == 'true' }}
      uses: useblacksmith/stickydisk@d58829ad6f9be8822ec5efe74256c82cd62915ab
      with:
        key: ${{ inputs.blacksmith-sticky-sccache-key }}
        path: .sccache
    - name: Setup Variables
      shell: bash
      run: |
        echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        echo "SCCACHE_CACHE_SIZE=100GB" >> $GITHUB_ENV
        if [ "${{ inputs.blacksmith-sticky-sccache }}" = "true" ]; then
          echo "SCCACHE_DIR=$GITHUB_WORKSPACE/.sccache" >> $GITHUB_ENV
        else
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        fi
        if [ -z "$RUSTFLAGS" ]; then
          echo "RUSTFLAGS=-C opt-level=3 -D warnings -C linker=clang -C link-arg=-fuse-ld=$(pwd)/mold/bin/mold" >> $GITHUB_ENV
        fi
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e
    - name: Setup Mold Linker
      shell: bash
      run: |
        mkdir -p mold
        curl -L --retry 10 --silent --show-error https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-$(uname -m)-linux.tar.gz | tar -C "$(realpath mold)" --strip-components=1 -xzf -
    - name: Install native build dependencies
      uses: ./.github/workflow-templates/native-build-deps
    - name: Setup Rust toolchain
      uses: ./.github/workflow-templates/rust-toolchain
    - name: Build Node
      shell: bash
      env:
        # Keep the native node in target/debug while still asking substrate-wasm-builder
        # to compact and compress runtime artifacts for CI consumers.
        WASM_BUILD_TYPE: release
      run: |
        params=" --locked -p moonbeam"
        if [ -n "${{ inputs.features }}" ]; then
          params="$params --features ${{ inputs.features }}"
        fi
        echo "cargo build $params"
        cargo build $params
    - name: Display binary comments
      shell: bash
      run: |
        readelf -p .comment ./target/debug/moonbeam
        GLIBC_VERSION="$(objdump -T ./target/debug/moonbeam | grep "GLIBC_" | sed 's/.*GLIBC_\([.0-9]*\).*/\1/g' | sort -Vu | tail -1)"
        echo "GLIBC Version: $GLIBC_VERSION"
    - name: Display sccache stats
      shell: bash
      run: ${SCCACHE_PATH} --show-stats
    - name: Verify binary version
      shell: bash
      run: |
        GIT_COMMIT="$(git log -1 --format="%H" | cut -c1-7)"
        MB_VERSION="$(./target/debug/moonbeam --version)"
        echo "Checking $MB_VERSION contains $GIT_COMMIT"
        echo "$MB_VERSION" | grep "$GIT_COMMIT"
    - name: Save runtimes wasm
      shell: bash
      run: |
        mkdir -p runtimes
        cp target/debug/wbuild/moon*/moon*_runtime.compact.compressed.wasm runtimes/
        mkdir -p uncompressed-runtimes
        cp target/debug/wbuild/moon*/moon*_runtime.wasm uncompressed-runtimes/
    - name: Save moonbeam binary
      shell: bash
      run: |
        mkdir -p build
        cp target/debug/moonbeam build/moonbeam
        strip build/moonbeam
        ls -lh build/moonbeam
