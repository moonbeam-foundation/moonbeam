  dev-test:
    # Moonbase dev tests are the required fast gate. Moonriver and moonbeam still
    # run for signal, but their failures are tolerated because they are flakier.
    # !cancelled() (rather than always()) lets this run even though TS-only changes
    # skip the Rust check jobs build depends on, while still cancelling on
    # supersede/manual cancel so we don't burn Blacksmith minutes on stale runs.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    needs: ["set-tags", "build"]
    continue-on-error: ${{ matrix.chain == 'moonriver' || matrix.chain == 'moonbeam' }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
        shard: [1, 2, 3, 4]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Create local folders
        run: |
          mkdir -p target/debug/wbuild/${{ matrix.chain }}-runtime/
      - name: "Download branch built runtime"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: target/debug/wbuild/${{ matrix.chain }}-runtime/
      - name: Restore moonbeam from sticky disk
        uses: ./.github/workflow-templates/moonbeam-sticky-disk
        with:
          mode: restore
          sticky-disk-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
      - uses: ./.github/workflow-templates/pnpm-blacksmith
      - name: "Run Moonwall Dev Tests"
        env:
          DEBUG_COLOURS: "1"
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: |
          cd test
          pnpm install
          pnpm compile-solidity
          pnpm moonwall test dev_${{ matrix.chain }} --ts ${{ matrix.shard }}/4

  dev-test-docs-only:
    # Branch protection requires the matrix-expanded dev-test check names. When
    # only docs changed, the real job-level condition skips before matrix
    # expansion, so emit cheap successful placeholders with the same names.
    if: ${{ needs.set-tags.outputs.any_changed == 'false' }}
    name: "dev-test (${{ matrix.chain }}, ${{ matrix.shard }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["set-tags"]
    strategy:
      fail-fast: false
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
        shard: [1, 2, 3, 4]
    steps:
      - run: echo "Skipping dev tests for docs-only changes."

  typescript-tracing-tests:
    # Tracing tests are expensive, so run them on master or when explicitly
    # requested on PRs.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success' &&
      (
        github.ref == 'refs/heads/master' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'A10-evmtracing'))
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs: ["set-tags", "build", "dev-test"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Restore moonbeam from sticky disk
        uses: ./.github/workflow-templates/moonbeam-sticky-disk
        with:
          mode: restore
          sticky-disk-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
      - run: |
          mkdir -p build
          cp target/debug/moonbeam build/moonbeam
      - uses: ./.github/workflow-templates/pnpm-blacksmith
      - name: Get tracing runtimes
        run: |
          ./scripts/build-last-tracing-runtime.sh ${{ needs.set-tags.outputs.git_branch }}
          mkdir -p test/moonbase-overrides/
          mv build/wasm/moonbase-runtime-local-substitute-tracing.wasm test/moonbase-overrides/
      - name: Preparing the repository
        run: |
          chmod uog+x build/moonbeam
          chmod uog+x target/debug/moonbeam
      - name: Running Tracing Tests
        env:
          DEBUG_COLOURS: "1"
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: |
          cd test
          pnpm install
          pnpm compile-solidity
          pnpm moonwall test dev_moonbase_tracing

  lazy-loading-tests:
    # Lazy-loading tests are expensive, so skip them when the required moonbase
    # dev-test gate has already failed.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chain: ["moonbeam"]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - uses: ./.github/workflow-templates/pnpm-blacksmith
      - name: Create local folders
        run: |
          mkdir -p target/debug/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp
      - name: "Download branch built runtime"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: target/debug/wbuild/${{ matrix.chain }}-runtime/
      - name: Restore moonbeam from sticky disk
        uses: ./.github/workflow-templates/moonbeam-sticky-disk
        with:
          mode: restore
          sticky-disk-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
      - name: "Run lazy loading tests"
        run: |
          cd test
          pnpm install
          pnpm moonwall test lazy_loading_${{ matrix.chain }}
      - name: Zip and Upload Node Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export NODE_LOGS_ZIP="node_logs_$TIMESTAMP.zip"
          find test/tmp/node_logs -maxdepth 1 -type f -name '*.log' -exec zip -r $NODE_LOGS_ZIP {} \;
          echo "NODE_LOGS_ZIP=${NODE_LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: failed-node-logs-lazy-loading-${{ matrix.chain }}
          path: ${{ env.NODE_LOGS_ZIP }}

  lazy-loading-tests-docs-only:
    if: ${{ needs.set-tags.outputs.any_changed == 'false' }}
    name: "lazy-loading-tests (${{ matrix.chain }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["set-tags"]
    strategy:
      fail-fast: false
      matrix:
        chain: ["moonbeam"]
    steps:
      - run: echo "Skipping lazy loading tests for docs-only changes."

  chopsticks-upgrade-test:
    # Upgrade tests consume larger runners, so only start them after moonbase
    # dev tests prove the PR is worth the heavier checks.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    # Does not restore the moonbeam binary (only downloads runtimes).
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - uses: ./.github/workflow-templates/pnpm-blacksmith
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - name: Create local folders
        run: |
          mkdir -p target/debug/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp/node_logs
      - name: "Download runtime"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: target/debug/wbuild/${{ matrix.chain }}-runtime/
      - name: "Install and run upgrade test"
        run: |
          pnpm install
      - name: Select stable Chopsticks fork block
        run: |
          cd test
          pnpm tsx scripts/select-chopsticks-fork-block.ts --chain ${{ matrix.chain }} --github-env "$GITHUB_ENV"
      - name: Run Upgrade Test (with retry)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          max_attempts: 3
          timeout_minutes: 15
          retry_on: error
          command: |
            cd test
            bun moonwall test upgrade_${{matrix.chain}}

  chopsticks-upgrade-test-docs-only:
    if: ${{ needs.set-tags.outputs.any_changed == 'false' }}
    name: "chopsticks-upgrade-test (${{ matrix.chain }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["set-tags"]
    strategy:
      fail-fast: false
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
    steps:
      - run: echo "Skipping chopsticks upgrade tests for docs-only changes."

  zombie_upgrade_test:
    # Zombie upgrade tests are expensive and run serially; run all runtimes on
    # master, but keep PRs to moonbeam only.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chain: ${{ github.ref == 'refs/heads/master' && fromJSON('["moonbase", "moonriver", "moonbeam"]') || fromJSON('["moonbeam"]') }}
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - uses: ./.github/workflow-templates/pnpm-blacksmith
      - name: Create local folders
        run: |
          mkdir -p target/debug/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp
      - name: "Download branch built runtime"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: target/debug/wbuild/${{ matrix.chain }}-runtime/
      - name: Restore moonbeam from sticky disk
        uses: ./.github/workflow-templates/moonbeam-sticky-disk
        with:
          mode: restore
          sticky-disk-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
      - name: Retrieve moonbeam binary from docker (for plainSpec generation)
        run: |
          LATEST_CLIENT=$(curl -s https://api.github.com/repos/moonbeam-foundation/moonbeam/releases | jq -r '.[] | select(.name | test("v";"i")) | .tag_name' | sort -rs | head -n 1 | tr -d '[:blank:]')
          echo "Latest client: $LATEST_CLIENT"
          wget https://github.com/moonbeam-foundation/moonbeam/releases/download/$LATEST_CLIENT/moonbeam -O test/tmp/moonbeam_rt
      - name: Prepare Chainspecs
        run: |
          cd test
          pnpm install

          ## Generate old spec using latest published node, modify it, and generate raw spec
          chmod uog+x tmp/moonbeam_rt
          chmod uog+x ../target/debug/moonbeam
          tmp/moonbeam_rt build-spec --chain ${{ matrix.chain }}-local > tmp/${{ matrix.chain }}-plain-spec.json
          pnpm tsx scripts/modify-plain-specs.ts process tmp/${{ matrix.chain }}-plain-spec.json tmp/${{ matrix.chain }}-modified-spec.json
          tmp/moonbeam_rt build-spec --chain tmp/${{ matrix.chain }}-modified-spec.json --raw > tmp/${{ matrix.chain }}-raw-spec.json
          pnpm tsx scripts/preapprove-rt-rawspec.ts process tmp/${{ matrix.chain }}-raw-spec.json tmp/${{ matrix.chain }}-modified-raw-spec.json ../target/debug/wbuild/${{ matrix.chain }}-runtime/${{ matrix.chain }}_runtime.compact.compressed.wasm
      - name: "Run zombie upgrade test"
        run: |
          cd test
          pnpm moonwall test zombie_${{ matrix.chain }}
      - name: Zip and Upload Node Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export NODE_LOGS_ZIP="node_logs_$TIMESTAMP.zip"
          MOST_RECENT_ZOMBIE_DIR=$(ls -td /tmp/zombie-* | head -n 1)
          find $MOST_RECENT_ZOMBIE_DIR -maxdepth 1 -type f -name '*.log' -exec zip -r $NODE_LOGS_ZIP {} \;
          echo "NODE_LOGS_ZIP=${NODE_LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: failed-node-logs-zombie-${{ matrix.chain }}
          path: ${{ env.NODE_LOGS_ZIP }}

  zombie_upgrade_test-docs-only:
    if: ${{ needs.set-tags.outputs.any_changed == 'false' }}
    name: "zombie_upgrade_test (${{ matrix.chain }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["set-tags"]
    strategy:
      fail-fast: false
      matrix:
        chain: ${{ github.ref == 'refs/heads/master' && fromJSON('["moonbase", "moonriver", "moonbeam"]') || fromJSON('["moonbeam"]') }}
    steps:
      - run: echo "Skipping zombie upgrade tests for docs-only changes."

  bridge-integration-tests:
    # Bridge integration tests are expensive and only relevant to Rust changes, so
    # run them on master or when explicitly requested on PRs.
    if: |
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.dev-test.result == 'success' &&
      (
        github.ref == 'refs/heads/master' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'B10-Bridge'))
      )
    needs: ["set-tags", "build", "dev-test"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: "Download branch built runtime"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: target/debug
      - name: "Download branch built node"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: moonbeam
          path: target/debug
      - name: Setup
        run: |
          # Install polkadot-js-api
          # https://github.com/paritytech/polkadot-sdk/blob/56f683fabfc5a4554d4b9208e91103624264407c/bridges/testing/framework/utils/bridges.sh#L21
          npm install -g @polkadot/api-cli
          chmod uog+x ./target/debug/moonbeam
          # This command prepares all required binaries and runs the bridge integration tests
          make run-bridge-integration-tests
      - name: Zip and Upload Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export LOGS_ZIP="bridge_integration_tests_$TIMESTAMP.zip"
          find /tmp/bridge-integration-tests -maxdepth 3 -type f -name '*.log' -exec zip -r $LOGS_ZIP {} \;
          echo "LOGS_ZIP=${LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: bridge-integration-tests-logs
          path: ${{ env.LOGS_ZIP }}

  moonbeam-sticky-cleanup:
    # Best-effort deletion of the per-run moonbeam sticky disk once every job that
    # mounts it has finished. Runs even when consumers fail or are skipped. If the
    # workflow is cancelled this may not run, but Blacksmith's 7-day inactivity
    # eviction is the backstop.
    if: always() && needs.set-tags.outputs.blacksmith_allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "build",
        "dev-test",
        "typescript-tracing-tests",
        "lazy-loading-tests",
        "zombie_upgrade_test",
      ]
    steps:
      - name: Delete per-run moonbeam sticky disk
        continue-on-error: true
        uses: useblacksmith/stickydisk-delete@b41313d28b8647d72114c9ba3c96bb04061562b6
        with:
          delete-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
