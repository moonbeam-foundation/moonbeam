name: Build

# Using a single file workflow is the preferred solution for our CI over workflow_runs.
# 1. It generates only 1 action item in the list making it more readable
# 2. It includes the PR/Commit text in the action item
# 3. Artifacts are not available between workflows.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches:
      - master
      - perm-*
  workflow_dispatch:
    inputs:
      pull_request:
        description: set to pull_request number to execute on external pr
        required: false

# Cancel any previous job still running this workflow for this branch
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs#example-using-concurrency-to-cancel-any-in-progress-job-or-run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=12288 --no-deprecation"
  CARGO_TERM_COLOR: always

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ####### Check files and formatting #######
  set-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      git_branch: ${{ steps.check-git-ref.outputs.git_branch }}
      git_ref: ${{ steps.check-git-ref.outputs.git_ref }}
      any_changed: ${{ steps.changed-files.outputs.any_changed == 'true' || steps.changed-files.outputs.any_deleted == 'true' }}
      rust_changed: ${{ steps.rust-changed.outputs.any_changed == 'true' || steps.rust-changed.outputs.any_deleted == 'true' }}
      ts_tests_changed: ${{ steps.test-typescript-changed.outputs.any_changed == 'true' || steps.test-typescript-changed.outputs.any_deleted == 'true' }}
      blacksmith_allowed: ${{ steps.check-git-ref.outputs.blacksmith_allowed }}
    steps:
      - name: Check git ref
        id: check-git-ref
        # if PR
        # else if manual PR
        # else (push)
        run: |
          if [[ -n "${{ github.event.pull_request.head.sha }}" ]]; then
            echo "git_branch=$(echo ${GITHUB_HEAD_REF})" >> $GITHUB_OUTPUT
            echo "git_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              echo "blacksmith_allowed=false" >> $GITHUB_OUTPUT
            else
              echo "blacksmith_allowed=true" >> $GITHUB_OUTPUT
            fi
          elif [[ -n "${{ github.event.inputs.pull_request }}" ]]; then
            echo "git_branch=$(echo ${GITHUB_HEAD_REF})" >> $GITHUB_OUTPUT
            echo "git_ref=refs/pull/${{ github.event.inputs.pull_request }}/head" >> $GITHUB_OUTPUT
            echo "blacksmith_allowed=false" >> $GITHUB_OUTPUT
          else
            echo "git_branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
            echo "git_ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "blacksmith_allowed=true" >> $GITHUB_OUTPUT
          fi
          echo "repo.full_name: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "github.repository: ${{ github.repository }}"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.check-git-ref.outputs.git_ref }}
      - name: Display variables
        run: |
          echo git_ref: ${{ steps.check-git-ref.outputs.git_ref }}
          echo blacksmith_allowed: ${{ steps.check-git-ref.outputs.blacksmith_allowed }}
      - name: Get all changed file(s), excluding the docs
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files_ignore: |
            **/**.md
            **/**.txt
            **.md
            **.txt
      - name: Get Rust-relevant changed file(s)
        id: rust-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files_ignore: |
            **/**.md
            **/**.txt
            **.md
            **.txt
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            biome.json
            test/.nvmrc
            test/**/*.js
            test/**/*.json
            test/**/*.ts
            types-bundle/**
            typescript-api/**
      - name: Get test and TypeScript API changed file(s)
        id: test-typescript-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files: |
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            biome.json
            test/.nvmrc
            test/**
            typescript-api/**

  check-copyright:
    if: ${{ needs.set-tags.outputs.any_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Find un-copyrighted files
        run: |
          find . \! -name '*.expanded.rs' -name '*.rs' -exec grep  -H -E -o -c Copyright {} \; | grep ':0' || true
          FILECOUNT=$(find . \! -name '*.expanded.rs' -name '*.rs' -exec grep  -H -E -o -c Copyright {} \; | grep -c ':0' || true)
          if [[ $FILECOUNT -eq 0 ]]; then
            true
          else
            false
          fi

  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: umbrelladocs/action-linkspector@v1
        with:
          reporter: github-pr-review
          fail_level: any
          filter_mode: nofilter

  check-biome:
    if: ${{ needs.set-tags.outputs.any_changed == 'true' }}
    name: "Check with Biome"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - run: pnpm install
      - run: pnpm check

  check-cargo-toml-format:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check Cargo.toml files format"
    runs-on:
      labels: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Check Cargo.toml files format with toml_sort
        run: ./scripts/check-cargo-toml-files-format.sh

  check-forbid-evm-reentrancy:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check 'forbid-evm-reentrancy'"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Verifies all 'pallet-evm/ethereum' use 'forbid-evm-reentrancy' feature
        run: ./scripts/check-forbid-evm-reentrancy.sh

  check-rust-fmt:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check with rustfmt"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Format code with rustfmt
        run: cargo fmt -- --check

  ####### Building and Testing binaries #######

  cargo-clippy:
    # Keep expensive clippy behind the cheap Rust checks so formatting or
    # repository-rule failures stop the PR before it consumes larger runners.
    # always() is required on jobs with needs: otherwise GitHub skips the job before
    # evaluating this condition when any dependency was skipped.
    if: |
      always() &&
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.check-cargo-toml-format.result == 'success' &&
      needs.check-forbid-evm-reentrancy.result == 'success' &&
      needs.check-rust-fmt.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Mount Blacksmith sccache disk
        uses: useblacksmith/stickydisk@d58829ad6f9be8822ec5efe74256c82cd62915ab
        with:
          key: ${{ github.repository }}-sccache-clippy-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
          path: .sccache
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e
      - name: Install native build dependencies
        uses: ./.github/workflow-templates/native-build-deps
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      # Development branch clippy check
      - name: Clippy (dev)
        if: github.ref != 'refs/heads/master' && !startsWith(github.ref, 'perm-')
        run: SKIP_WASM_BUILD=1 env -u RUSTFLAGS cargo clippy --features try-runtime,runtime-benchmarks
      # Main branch (master, perm-*) clippy check
      # Disallows: todo
      - name: Clippy (main)
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'perm-')
        run: SKIP_WASM_BUILD=1 env -u RUSTFLAGS cargo clippy --features try-runtime,runtime-benchmarks -- -Dclippy::todo
      - name: Display sccache stats
        run: ${SCCACHE_PATH} --show-stats

  build:
    # The build is needed for Rust changes or TS/Moonwall test changes. Rust and
    # mixed Rust+TS changes must first pass the quick Rust checks; TS-only test
    # changes can build directly.
    if: |
      always() &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      (
        (
          needs.set-tags.outputs.rust_changed == 'true' &&
          needs.check-cargo-toml-format.result == 'success' &&
          needs.check-forbid-evm-reentrancy.result == 'success' &&
          needs.check-rust-fmt.result == 'success'
        ) ||
        (
          needs.set-tags.outputs.ts_tests_changed == 'true' &&
          needs.set-tags.outputs.rust_changed == 'false'
        )
      )
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Cargo build
        uses: ./.github/workflow-templates/cargo-build
        with:
          features: metadata-hash
          blacksmith-sticky-sccache: "true"
          blacksmith-sticky-sccache-key: ${{ github.repository }}-sccache-release-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
      - name: Upload runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtimes
          path: runtimes
      - name: Upload uncompressed runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: uncompressed-runtimes
          path: uncompressed-runtimes
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: moonbeam
          path: build

  rust-test:
    # Rust tests are one of the most expensive PR jobs, so only run them after the
    # quick Rust checks and the moonbase dev-test gate have passed.
    if: |
      always() &&
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.check-cargo-toml-format.result == 'success' &&
      needs.check-forbid-evm-reentrancy.result == 'success' &&
      needs.check-rust-fmt.result == 'success' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
        "dev-test",
      ]
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Mount Blacksmith sccache disk
        uses: useblacksmith/stickydisk@d58829ad6f9be8822ec5efe74256c82cd62915ab
        with:
          key: ${{ github.repository }}-sccache-release-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
          path: .sccache
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e
      - name: Setup Variables
        shell: bash
        run: |
          echo "RUSTFLAGS=-C opt-level=3 -D warnings -C linker=clang -C link-arg=-fuse-ld=$(pwd)/mold/bin/mold" >> $GITHUB_ENV
      - name: Setup Mold Linker
        shell: bash
        run: |
          mkdir -p mold
          curl -L --retry 10 --silent --show-error https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-$(uname -m)-linux.tar.gz | tar -C $(realpath mold) --strip-components=1 -xzf -
      - name: Install native build dependencies
        uses: ./.github/workflow-templates/native-build-deps
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      # Verify that the runtime-benchmarks feature compiles on its own
      - name: Check runtime-benchmarks compilation
        run: |
          cargo check --profile testnet --workspace --features=runtime-benchmarks
      # Checks are run after uploading artifacts since they are modified by the tests
      # The xcm-emulator-tests crates are workspace members so the dedicated
      # `xcm-emulator-test` job can address them with `-p`, but they pull the
      # heavy Westend + Asset Hub Westend graph. Exclude them here so the
      # default test job neither builds nor re-runs that suite.
      - name: Unit tests
        run: |
          cargo test --profile testnet --workspace --features=evm-tracing \
            --exclude moonbeam-xcm-emulator-tests \
            --exclude moonriver-xcm-emulator-tests \
            --exclude moonbase-xcm-emulator-tests

  # Dedicated job for the xcm-emulator integration tests, which live in
  # their own workspace crates (`runtime/<chain>/xcm-emulator-tests`) so the
  # Westend + Asset Hub Westend dependency graph doesn't slow down the
  # default `rust-test` job. Compiles the heavy graph once and runs all
  # three runtimes' tests in a single job (sccache reuse). Only fires when
  # Rust source files change.
  # Opt-in only on PRs: the XCM emulator suite is heavy (Westend + Asset Hub
  # Westend), so we don't want it on the critical path of every PR. It runs
  # when:
  #   - a PR is labelled `XCM`,
  #   - the workflow is triggered manually (`workflow_dispatch`), or
  #   - on push to `master`/`perm-*` (so master is at least eventually
  #     validated, since there's no merge queue to gate pre-merge).
  xcm-emulator-test:
    if: |
      (
        github.event_name == 'push'
        || github.event_name == 'workflow_dispatch'
        || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'XCM'))
      ) &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.set-tags.outputs.any_changed == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
    needs: ["set-tags"]
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_GHA_ENABLED: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Setup Variables
        shell: bash
        run: |
          echo "RUSTFLAGS=-C opt-level=3 -D warnings -C linker=clang -C link-arg=-fuse-ld=$(pwd)/mold/bin/mold" >> $GITHUB_ENV
      - name: Setup Mold Linker
        shell: bash
        run: |
          mkdir -p mold
          curl -L --retry 10 --silent --show-error https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-$(uname -m)-linux.tar.gz | tar -C $(realpath mold) --strip-components=1 -xzf -
      - name: Setup Rust toolchain
        run: |
          if ! which "rustup" > /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          rustup override unset
          rustup show
          rustup target add wasm32-unknown-unknown
      - name: xcm-emulator integration tests (moonbeam, moonriver, moonbase)
        run: |
          cargo test --profile testnet \
            -p moonbeam-xcm-emulator-tests \
            -p moonriver-xcm-emulator-tests \
            -p moonbase-xcm-emulator-tests

  # Renable typegen_check when we have a bot in place to update PR for us in case of missing it

  # typegen_check:
  #   needs: ["set-tags", "build"]
  #   name: "Check Rust/TS bindings are up to date"
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v6
  #       with:
  #         ref: ${{ needs.set-tags.outputs.git_ref }}
  #     - uses: pnpm/action-setup@v6
  #       with:
  #         version: 9
  #         cache: true
  #         cache_dependency_path: pnpm-lock.yaml
  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version-file: "test/.nvmrc"
  #         package-manager-cache: false
  #     - name: "Download branch built node"
  #       uses: actions/download-artifact@v8
  #       with:
  #         name: moonbeam
  #         path: target/release
  #     - run: chmod uog+x target/release/moonbeam
  #     - name: Run Typegen
  #       run: |
  #         pnpm i

  #         cd test
  #         pnpm typegen
  #     - name: Check for changes
  #       run: |
  #         cd typescript-api
  #         if [ -n "$(git status --porcelain .)" ]; then
  #           echo "Typegen produced changes. Please run 'pnpm typegen' locally and commit the changes."
  #           false
  #         else
  #           echo "No changes"
  #           true
  #         fi

  dev-test:
    # Moonbase dev tests are the required fast gate. Moonriver and moonbeam still
    # run for signal, but their failures are tolerated because they are flakier.
    if: |
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    needs: ["set-tags", "build"]
    continue-on-error: ${{ matrix.chain == 'moonriver' || matrix.chain == 'moonbeam' }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
        shard: [1, 2, 3, 4]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - name: Create local folders
        run: |
          mkdir -p target/release/wbuild/${{ matrix.chain }}-runtime/
      - name: "Download branch built runtime"
        uses: actions/download-artifact@v8
        with:
          name: runtimes
          path: target/release/wbuild/${{ matrix.chain }}-runtime/
      - name: "Download branch built node"
        uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: target/release
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - name: "Run Moonwall Dev Tests"
        env:
          DEBUG_COLOURS: "1"
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: |
          chmod uog+x target/release/moonbeam
          cd test
          pnpm install
          pnpm compile-solidity
          pnpm moonwall test dev_${{ matrix.chain }} --ts ${{ matrix.shard }}/4

  typescript-tracing-tests:
    # Tracing tests are expensive, so run them on master or when explicitly
    # requested on PRs.
    if: |
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success' &&
      (
        github.ref == 'refs/heads/master' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'A10-evmtracing'))
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs: ["set-tags", "build", "dev-test"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: build
      - name: Use pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - run: |
          mkdir -p target/release
      - name: "Download branch built node"
        uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: target/release
      - name: Get tracing runtimes
        run: |
          ./scripts/build-last-tracing-runtime.sh ${{ needs.set-tags.outputs.git_branch }}
          mkdir -p test/moonbase-overrides/
          mv build/wasm/moonbase-runtime-local-substitute-tracing.wasm test/moonbase-overrides/
      - name: Preparing the repository
        run: |
          chmod uog+x build/moonbeam
          chmod uog+x target/release/moonbeam
      - name: Running Tracing Tests
        env:
          DEBUG_COLOURS: "1"
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: |
          cd test
          pnpm install
          pnpm compile-solidity
          pnpm moonwall test dev_moonbase_tracing

  lazy-loading-tests:
    # Lazy-loading tests are expensive, so skip them when the required moonbase
    # dev-test gate has already failed.
    if: |
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chain: ["moonbeam"]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - name: Create local folders
        run: |
          mkdir -p target/release/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp
      - name: "Download branch built runtime"
        uses: actions/download-artifact@v8
        with:
          name: runtimes
          path: target/release/wbuild/${{ matrix.chain }}-runtime/
      - name: "Download branch built node"
        uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: target/release
      - name: "Run lazy loading tests"
        run: |
          chmod uog+x target/release/moonbeam
          cd test
          pnpm install
          pnpm moonwall test lazy_loading_${{ matrix.chain }}
      - name: Zip and Upload Node Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export NODE_LOGS_ZIP="node_logs_$TIMESTAMP.zip"
          find test/tmp/node_logs -maxdepth 1 -type f -name '*.log' -exec zip -r $NODE_LOGS_ZIP {} \;
          echo "NODE_LOGS_ZIP=${NODE_LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: failed-node-logs-lazy-loading-${{ matrix.chain }}
          path: ${{ env.NODE_LOGS_ZIP }}

  chopsticks-upgrade-test:
    # Upgrade tests consume larger runners, so only start them after moonbase
    # dev tests prove the PR is worth the heavier checks.
    if: |
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      matrix:
        chain: ["moonbase", "moonriver", "moonbeam"]
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Create local folders
        run: |
          mkdir -p target/release/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp/node_logs
      - name: "Download runtime"
        uses: actions/download-artifact@v8
        with:
          name: runtimes
          path: target/release/wbuild/${{ matrix.chain }}-runtime/
      - name: "Install and run upgrade test"
        run: |
          pnpm install
      - name: Run Upgrade Test (with retry)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 15
          retry_on: error
          command: |
            cd test
            bun moonwall test upgrade_${{matrix.chain}}

  zombie_upgrade_test:
    # Zombie upgrade tests are expensive and run serially; run all runtimes on
    # master, but keep PRs to moonbeam only.
    if: |
      (needs.set-tags.outputs.rust_changed == 'true' || needs.set-tags.outputs.ts_tests_changed == 'true') &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs: ["set-tags", "build", "dev-test"]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chain: ${{ github.ref == 'refs/heads/master' && fromJSON('["moonbase", "moonriver", "moonbeam"]') || fromJSON('["moonbeam"]') }}
    env:
      GH_WORKFLOW_MATRIX_CHAIN: ${{ matrix.chain }}
      DEBUG_COLORS: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - name: Create local folders
        run: |
          mkdir -p target/release/wbuild/${{ matrix.chain }}-runtime/
          mkdir -p test/tmp
      - name: "Download branch built runtime"
        uses: actions/download-artifact@v8
        with:
          name: runtimes
          path: target/release/wbuild/${{ matrix.chain }}-runtime/
      - name: "Download branch built node"
        uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: target/release
      - name: Retrieve moonbeam binary from docker (for plainSpec generation)
        run: |
          LATEST_CLIENT=$(curl -s https://api.github.com/repos/moonbeam-foundation/moonbeam/releases | jq -r '.[] | select(.name | test("v";"i")) | .tag_name' | sort -rs | head -n 1 | tr -d '[:blank:]')
          echo "Latest client: $LATEST_CLIENT"
          wget https://github.com/moonbeam-foundation/moonbeam/releases/download/$LATEST_CLIENT/moonbeam -O test/tmp/moonbeam_rt
      - name: Prepare Chainspecs
        run: |
          cd test
          pnpm install

          ## Generate old spec using latest published node, modify it, and generate raw spec
          chmod uog+x tmp/moonbeam_rt
          chmod uog+x ../target/release/moonbeam
          tmp/moonbeam_rt build-spec --chain ${{ matrix.chain }}-local > tmp/${{ matrix.chain }}-plain-spec.json
          pnpm tsx scripts/modify-plain-specs.ts process tmp/${{ matrix.chain }}-plain-spec.json tmp/${{ matrix.chain }}-modified-spec.json
          tmp/moonbeam_rt build-spec --chain tmp/${{ matrix.chain }}-modified-spec.json --raw > tmp/${{ matrix.chain }}-raw-spec.json
          pnpm tsx scripts/preapprove-rt-rawspec.ts process tmp/${{ matrix.chain }}-raw-spec.json tmp/${{ matrix.chain }}-modified-raw-spec.json ../target/release/wbuild/${{ matrix.chain }}-runtime/${{ matrix.chain }}_runtime.compact.compressed.wasm
      - name: "Run zombie upgrade test"
        run: |
          cd test
          pnpm moonwall test zombie_${{ matrix.chain }}
      - name: Zip and Upload Node Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export NODE_LOGS_ZIP="node_logs_$TIMESTAMP.zip"
          MOST_RECENT_ZOMBIE_DIR=$(ls -td /tmp/zombie-* | head -n 1)
          find $MOST_RECENT_ZOMBIE_DIR -maxdepth 1 -type f -name '*.log' -exec zip -r $NODE_LOGS_ZIP {} \;
          echo "NODE_LOGS_ZIP=${NODE_LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: failed-node-logs-zombie-${{ matrix.chain }}
          path: ${{ env.NODE_LOGS_ZIP }}

  bridge-integration-tests:
    # Bridge integration tests are expensive and only relevant to Rust changes, so
    # run them on master or when explicitly requested on PRs.
    if: |
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.dev-test.result == 'success' &&
      (
        github.ref == 'refs/heads/master' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'B10-Bridge'))
      )
    needs: ["set-tags", "build", "dev-test"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: "Download branch built runtime"
        uses: actions/download-artifact@v8
        with:
          name: runtimes
          path: target/release
      - name: "Download branch built node"
        uses: actions/download-artifact@v8
        with:
          name: moonbeam
          path: target/release
      - name: Setup
        run: |
          # Install polkadot-js-api
          # https://github.com/paritytech/polkadot-sdk/blob/56f683fabfc5a4554d4b9208e91103624264407c/bridges/testing/framework/utils/bridges.sh#L21
          npm install -g @polkadot/api-cli
          chmod uog+x ./target/release/moonbeam
          # This command prepares all required binaries and runs the bridge integration tests
          make run-bridge-integration-tests
      - name: Zip and Upload Logs on Failure
        if: failure()
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          export LOGS_ZIP="bridge_integration_tests_$TIMESTAMP.zip"
          find /tmp/bridge-integration-tests -maxdepth 3 -type f -name '*.log' -exec zip -r $LOGS_ZIP {} \;
          echo "LOGS_ZIP=${LOGS_ZIP}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: bridge-integration-tests-logs
          path: ${{ env.LOGS_ZIP }}
