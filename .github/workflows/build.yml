name: Build

# Using a single file workflow is the preferred solution for our CI over workflow_runs.
# 1. It generates only 1 action item in the list making it more readable
# 2. It includes the PR/Commit text in the action item
# 3. Artifacts are not available between workflows.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches:
      - master
      - perm-*
  workflow_dispatch:
    inputs:
      pull_request:
        description: set to pull_request number to execute on external pr
        required: false

# Cancel any previous job still running this workflow for this branch
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs#example-using-concurrency-to-cancel-any-in-progress-job-or-run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=12288 --no-deprecation"
  CARGO_TERM_COLOR: always
  # One sticky disk per workflow run (no slashes in the key). A dedicated publish job
  # writes once; Blacksmith test jobs restore without each downloading the artifact.
  # Owner/name/id are sourced from the event's repository object so the cleanup
  # workflow (cleanup-sticky-disk.yml) can reconstruct the exact same key from its
  # github.event.workflow_run.repository payload. Keep these two in sync.
  MOONBEAM_STICKY_DISK_KEY: ${{ github.event.repository.owner.login }}-${{ github.event.repository.name }}-ci-moonbeam-${{ github.run_id }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ####### Check files and formatting #######
  set-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      git_branch: ${{ steps.check-git-ref.outputs.git_branch }}
      git_ref: ${{ steps.check-git-ref.outputs.git_ref }}
      any_changed: ${{ steps.changed-files.outputs.any_changed == 'true' || steps.changed-files.outputs.any_deleted == 'true' }}
      rust_changed: ${{ steps.rust-changed.outputs.any_changed == 'true' || steps.rust-changed.outputs.any_deleted == 'true' }}
      benchmarks_changed: ${{ steps.benchmarks-changed.outputs.any_changed == 'true' || steps.benchmarks-changed.outputs.any_deleted == 'true' }}
      ts_tests_changed: ${{ steps.test-typescript-changed.outputs.any_changed == 'true' || steps.test-typescript-changed.outputs.any_deleted == 'true' }}
      blacksmith_allowed: ${{ steps.check-git-ref.outputs.blacksmith_allowed }}
    steps:
      - name: Check git ref
        id: check-git-ref
        # if PR
        # else if manual PR
        # else (push)
        run: |
          if [[ -n "${{ github.event.pull_request.head.sha }}" ]]; then
            echo "git_branch=$(echo ${GITHUB_HEAD_REF})" >> $GITHUB_OUTPUT
            echo "git_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              echo "blacksmith_allowed=false" >> $GITHUB_OUTPUT
            else
              echo "blacksmith_allowed=true" >> $GITHUB_OUTPUT
            fi
          elif [[ -n "${{ github.event.inputs.pull_request }}" ]]; then
            echo "git_branch=$(echo ${GITHUB_HEAD_REF})" >> $GITHUB_OUTPUT
            echo "git_ref=refs/pull/${{ github.event.inputs.pull_request }}/head" >> $GITHUB_OUTPUT
            echo "blacksmith_allowed=false" >> $GITHUB_OUTPUT
          else
            echo "git_branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
            echo "git_ref=$GITHUB_REF" >> $GITHUB_OUTPUT
            echo "blacksmith_allowed=true" >> $GITHUB_OUTPUT
          fi
          echo "repo.full_name: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "github.repository: ${{ github.repository }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.check-git-ref.outputs.git_ref }}
          persist-credentials: false
      - name: Display variables
        run: |
          echo git_ref: ${{ steps.check-git-ref.outputs.git_ref }}
          echo blacksmith_allowed: ${{ steps.check-git-ref.outputs.blacksmith_allowed }}
      - name: Get all changed file(s), excluding the docs
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files_ignore: |
            **/**.md
            **/**.txt
            **.md
            **.txt
      - name: Get Rust-relevant changed file(s)
        id: rust-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files_ignore: |
            **/**.md
            **/**.txt
            **.md
            **.txt
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            biome.json
            test/.nvmrc
            test/**/*.js
            test/**/*.json
            test/**/*.ts
            types-bundle/**
            typescript-api/**
      - name: Get benchmark-relevant changed file(s)
        id: benchmarks-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files: |
            Cargo.lock
            **/weights.rs
            **/benchmarks.rs
            weights/**
            **/weights/**
      - name: Get test and TypeScript API changed file(s)
        id: test-typescript-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62
        with:
          files: |
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            biome.json
            test/.nvmrc
            test/**
            typescript-api/**

  check-copyright:
    if: ${{ needs.set-tags.outputs.any_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Find un-copyrighted files
        run: |
          find . \! -name '*.expanded.rs' -name '*.rs' -exec grep  -H -E -o -c Copyright {} \; | grep ':0' || true
          FILECOUNT=$(find . \! -name '*.expanded.rs' -name '*.rs' -exec grep  -H -E -o -c Copyright {} \; | grep -c ':0' || true)
          if [[ $FILECOUNT -eq 0 ]]; then
            true
          else
            false
          fi

  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Install Chrome for linkspector
        run: npx --yes puppeteer@24.31.0 browsers install chrome@148.0.7778.97
      - uses: umbrelladocs/action-linkspector@ec40914b4aaecb3c7648033eac41abbb0a6a33b8
        with:
          reporter: github-pr-review
          fail_level: any
          filter_mode: nofilter

  check-biome:
    if: ${{ needs.set-tags.outputs.any_changed == 'true' }}
    name: "Check with Biome"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9
          cache: true
          cache_dependency_path: pnpm-lock.yaml
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: "test/.nvmrc"
          package-manager-cache: false
      - run: pnpm install
      - name: Run Biome
        run: |
          pnpm --dir types-bundle exec biome check . --diagnostic-level=error
          pnpm --dir typescript-api exec biome check . --diagnostic-level=error
          pnpm --dir test exec biome check . --diagnostic-level=error

  check-cargo-toml-format:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check Cargo.toml files format"
    runs-on:
      labels: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Check Cargo.toml files format with toml_sort
        run: ./scripts/check-cargo-toml-files-format.sh

  check-forbid-evm-reentrancy:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check 'forbid-evm-reentrancy'"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Verifies all 'pallet-evm/ethereum' use 'forbid-evm-reentrancy' feature
        run: ./scripts/check-forbid-evm-reentrancy.sh

  check-rust-fmt:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check with rustfmt"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: Format code with rustfmt
        run: cargo fmt -- --check

  check-rust-feature-propagation:
    if: ${{ needs.set-tags.outputs.rust_changed == 'true' }}
    name: "Check Feature Propagation"
    runs-on:
      labels: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: ["set-tags"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
          fetch-depth: 0
      - name: Check features
        run: |
          # Install zepter
          cargo install zepter -f --locked --version 0.13.2
          # Run checks
          zepter_output="$(mktemp)"
          set +e
          zepter run check 2>&1 | tee "$zepter_output"
          zepter_status=${PIPESTATUS[0]}
          set -e

          if [[ "$zepter_status" -ne 0 ]]; then
            exit "$zepter_status"
          fi

          # Zepter 0.13.2 can print failed workflow checks while still exiting
          # successfully. Treat those diagnostics as failures so CI does not
          # pass Cargo.toml-only changes with feature propagation issues.
          if grep -Eq "Found [1-9][0-9]* issues|Error: Command '.+' failed" "$zepter_output"; then
            echo "::error::Zepter reported failed checks but exited successfully"
            exit 1
          fi

  ####### Building and Testing binaries #######

  cargo-clippy:
    # Keep expensive clippy behind the cheap Rust checks so formatting or
    # repository-rule failures stop the PR before it consumes larger runners.
    # always() is required on jobs with needs: otherwise GitHub skips the job before
    # evaluating this condition when any dependency was skipped.
    if: |
      always() &&
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.check-cargo-toml-format.result == 'success' &&
      needs.check-forbid-evm-reentrancy.result == 'success' &&
      needs.check-rust-fmt.result == 'success' &&
      needs.check-rust-feature-propagation.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
        "check-rust-feature-propagation",
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Mount Blacksmith sccache disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-sccache-clippy-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
          path: .sccache
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696
      - name: Install native build dependencies
        uses: ./.github/workflow-templates/native-build-deps
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      # Development branch clippy check
      - name: Clippy (dev)
        if: github.ref != 'refs/heads/master' && !startsWith(github.ref, 'perm-')
        run: SKIP_WASM_BUILD=1 env -u RUSTFLAGS cargo clippy --features try-runtime,runtime-benchmarks
      # Main branch (master, perm-*) clippy check
      # Disallows: todo
      - name: Clippy (main)
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'perm-')
        run: SKIP_WASM_BUILD=1 env -u RUSTFLAGS cargo clippy --features try-runtime,runtime-benchmarks -- -Dclippy::todo
      - name: Display sccache stats
        run: ${SCCACHE_PATH} --show-stats

  build:
    # The build is needed for Rust changes or TS/Moonwall test changes. Rust and
    # mixed Rust+TS changes must first pass the quick Rust checks; TS-only test
    # changes can build directly.
    if: |
      always() &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      (
        (
          needs.set-tags.outputs.rust_changed == 'true' &&
          needs.check-cargo-toml-format.result == 'success' &&
          needs.check-forbid-evm-reentrancy.result == 'success' &&
          needs.check-rust-fmt.result == 'success' &&
          needs.check-rust-feature-propagation.result == 'success'
        ) ||
        (
          needs.set-tags.outputs.ts_tests_changed == 'true' &&
          needs.set-tags.outputs.rust_changed == 'false'
        )
      )
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
        "check-rust-feature-propagation",
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Cargo build
        uses: ./.github/workflow-templates/cargo-build
        with:
          features: metadata-hash
          blacksmith-sticky-sccache: "true"
          blacksmith-sticky-sccache-key: ${{ github.repository }}-sccache-release-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
      # Publish the freshly built binary to the sticky disk from local disk (no
      # artifact round-trip through GitHub blob storage). Consumers `needs: build`,
      # so the commit (in the action's post-step) lands before they mount.
      - name: Publish moonbeam to sticky disk
        if: needs.set-tags.outputs.blacksmith_allowed == 'true'
        uses: ./.github/workflow-templates/moonbeam-sticky-disk
        with:
          mode: publish
          sticky-disk-key: ${{ env.MOONBEAM_STICKY_DISK_KEY }}
      - name: Upload runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtimes
          path: runtimes
      - name: Upload uncompressed runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: uncompressed-runtimes
          path: uncompressed-runtimes
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: moonbeam
          path: build

  rust-test:
    # Rust tests are one of the most expensive PR jobs, so only run them after the
    # quick Rust checks and the moonbase dev-test gate have passed.
    if: |
      !cancelled() &&
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.check-cargo-toml-format.result == 'success' &&
      needs.check-forbid-evm-reentrancy.result == 'success' &&
      needs.check-rust-fmt.result == 'success' &&
      needs.check-rust-feature-propagation.result == 'success' &&
      needs.dev-test.result == 'success'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
        "check-rust-feature-propagation",
        "dev-test",
      ]
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SKIP_WASM_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Mount Blacksmith sccache disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-sccache-rust-test-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
          path: .sccache
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696
      - name: Setup Variables
        shell: bash
        run: |
          mold_path="$(pwd)/mold/bin/mold"
          echo "RUSTFLAGS=-D warnings -C linker=clang -C link-arg=-fuse-ld=${mold_path}" >> "$GITHUB_ENV"
      - name: Setup Mold Linker
        shell: bash
        run: |
          mkdir -p mold
          curl -L --retry 10 --silent --show-error https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-$(uname -m)-linux.tar.gz | tar -C $(realpath mold) --strip-components=1 -xzf -
      - name: Install native build dependencies
        uses: ./.github/workflow-templates/native-build-deps
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      # Verify that the runtime-benchmarks feature compiles on its own
      - name: Check runtime-benchmarks compilation
        if: github.ref == 'refs/heads/master' || needs.set-tags.outputs.benchmarks_changed == 'true'
        run: |
          cargo check --profile rust-tests --workspace --features=runtime-benchmarks
      # Checks are run after uploading artifacts since they are modified by the tests
      # The xcm-emulator-tests crates are workspace members so the dedicated
      # `xcm-emulator-test` job can address them with `-p`, but they pull the
      # heavy Westend + Asset Hub Westend graph. Exclude them here so the
      # default test job neither builds nor re-runs that suite.
      - name: Unit tests
        run: |
          cargo test --profile rust-tests --workspace --features=evm-tracing \
            --exclude moonbeam-xcm-emulator-tests \
            --exclude moonriver-xcm-emulator-tests \
            --exclude moonbase-xcm-emulator-tests

  # Dedicated job for the xcm-emulator integration tests, which live in
  # their own workspace crates (`runtime/<chain>/xcm-emulator-tests`) so the
  # Westend + Asset Hub Westend dependency graph doesn't slow down the
  # default `rust-test` job. Compiles the heavy graph once and runs all
  # three runtimes' tests in a single job (sccache reuse). Only fires when
  # Rust source files change.
  # Opt-in only on PRs: the XCM emulator suite is heavy (Westend + Asset Hub
  # Westend), so we don't want it on the critical path of every PR. It runs
  # when:
  #   - a PR is labelled `XCM`,
  #   - the workflow is triggered manually (`workflow_dispatch`), or
  #   - on push to `master`/`perm-*` (so master is at least eventually
  #     validated, since there's no merge queue to gate pre-merge).
  xcm-emulator-test:
    # Keep this heavy job behind the cheap Rust checks so formatting or
    # repository-rule failures stop the PR before it consumes the larger runner.
    # always() is required on jobs with needs: otherwise GitHub skips the job before
    # evaluating this condition when any dependency was skipped.
    if: |
      always() &&
      (
        github.event_name == 'push'
        || github.event_name == 'workflow_dispatch'
        || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'XCM'))
      ) &&
      needs.set-tags.outputs.blacksmith_allowed == 'true' &&
      needs.set-tags.outputs.rust_changed == 'true' &&
      needs.check-cargo-toml-format.result == 'success' &&
      needs.check-forbid-evm-reentrancy.result == 'success' &&
      needs.check-rust-fmt.result == 'success'
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    needs:
      [
        "set-tags",
        "check-cargo-toml-format",
        "check-forbid-evm-reentrancy",
        "check-rust-fmt",
      ]
    env:
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "100GB"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.set-tags.outputs.git_ref }}
          persist-credentials: false
      - name: Read Rust toolchain cache key
        id: rust-toolchain-cache-key
        uses: ./.github/workflow-templates/rust-toolchain-cache-key
      - name: Mount Blacksmith sccache disk
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-sccache-xcm-emulator-${{ runner.os }}-${{ steps.rust-toolchain-cache-key.outputs.cache-key }}
          path: .sccache
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696
      - name: Setup Variables
        shell: bash
        run: |
          echo "RUSTFLAGS=-C opt-level=3 -D warnings -C linker=clang -C link-arg=-fuse-ld=$(pwd)/mold/bin/mold" >> $GITHUB_ENV
      - name: Setup Mold Linker
        shell: bash
        run: |
          mkdir -p mold
          curl -L --retry 10 --silent --show-error https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-$(uname -m)-linux.tar.gz | tar -C $(realpath mold) --strip-components=1 -xzf -
      - name: Install native build dependencies
        uses: ./.github/workflow-templates/native-build-deps
      - name: Setup Rust toolchain
        uses: ./.github/workflow-templates/rust-toolchain
      - name: xcm-emulator integration tests (moonbeam, moonriver, moonbase)
        run: |
          cargo test --profile rust-tests \
            -p moonbeam-xcm-emulator-tests \
            -p moonriver-xcm-emulator-tests \
            -p moonbase-xcm-emulator-tests

  # Renable typegen_check when we have a bot in place to update PR for us in case of missing it

