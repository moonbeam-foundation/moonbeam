name: Publish Docker runtime

on:
  workflow_dispatch:
    inputs:
      tag:
        description: runtime tag (ex. runtime-3400) to publish on docker
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ####### Building binaries #######

  build-binary:
    runs-on: moonbeam-release-medium
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0
      - name: Build production moonbeam
        run: |
          docker build \
            --tag prod --no-cache \
            --build-arg="COMMIT=${{ github.event.inputs.tag }}" \
            --build-arg="RUSTFLAGS=-C target-cpu=x86-64" \
            - < docker/moonbeam-production.Dockerfile

          docker rm -f dummy 2> /dev/null || true
          docker create -ti --name dummy prod bash
          docker cp dummy:/moonbeam/moonbeam moonbeam
          docker rm -f dummy

          GLIBC_VERSION="$(objdump -T moonbeam | grep "GLIBC_" | sed 's/.*GLIBC_\([.0-9]*\).*/\1/g' | sort -Vu | tail -1)"

          if [[ $GLIBC_VERSION == "2.34" ]]; then
            echo "Using expected GLIBC version: ${GLIBC_VERSION}"
          else
            echo "Unexpected GLIBC version: ${GLIBC_VERSION}"
            exit 1
          fi

          docker rmi prod
      - name: Save parachain binary
        run: |
          mkdir -p build
          cp moonbeam build/moonbeam-x86-64
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binaries-x86-64
          path: build/moonbeam-x86-64

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["build-binary"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          merge-multiple: true
          path: build
      - name: Prepare
        id: prep
        run: |
          echo "rename default binary"
          mv build/moonbeam-x86-64 build/moonbeam
          DOCKER_IMAGE=moonbeamfoundation/moonbeam
          TAGS="${DOCKER_IMAGE}:${{ github.event.inputs.tag }}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:v0.30.0
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MBF_DOCKERHUB_USERNAME }}
          password: ${{ secrets.MBF_DOCKERHUB_PASSWORD }}
      - name: Build and push moonbeam
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/moonbeam.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
