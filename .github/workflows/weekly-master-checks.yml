name: Weekly master checks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0" # Runs every Sunday at 5:00 AM UTC

env:
  FRAME_OMNI_BENCHER_RELEASE_VERSION: polkadot-stable2509-2

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check-benchmarks:
    if: github.ref == 'refs/heads/master'
    runs-on:
      labels: bare-metal
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runtime: [moonbeam, moonbase, moonriver]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: master
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Variables
        run: |
          echo "RUSTFLAGS=-C opt-level=3 -D warnings -C linker=clang -C link-arg=-fuse-ld=$(pwd)/mold/bin/mold" >> "$GITHUB_ENV"
      - name: Setup Mold Linker
        run: |
          mkdir -p mold
          ARCH="$(uname -m)"
          curl -L --retry 10 --silent --show-error "https://github.com/rui314/mold/releases/download/v2.39.0/mold-2.39.0-${ARCH}-linux.tar.gz" | tar -C "$(realpath mold)" --strip-components=1 -xzf -
      # With rustup's nice new toml format, we just need to run rustup show to install the toolchain
      # https://github.com/actions-rs/toolchain/issues/126#issuecomment-782989659
      - name: Setup Rust toolchain
        shell: bash
        run: |
          if ! which "rustup" > /dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              export PATH="$HOME/.cargo/bin:$PATH"
              echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup override unset
          rustup show
          rustup target add wasm32-unknown-unknown
      - name: Install frame-omni-bencher
        shell: bash
        run: |
          curl -sL "https://github.com/paritytech/polkadot-sdk/releases/download/${FRAME_OMNI_BENCHER_RELEASE_VERSION}/frame-omni-bencher" -o frame-omni-bencher
          chmod +x ./frame-omni-bencher
          ./frame-omni-bencher --version
      - name: Run benchmarks
        shell: bash
        run: |
          ./scripts/run-benches-for-runtime.sh ${{ matrix.runtime }} release
          if test -f "benchmarking_errors.txt"; then
            cat benchmarking_errors.txt
            exit 1
          fi
          cargo build -r -p ${{ matrix.runtime }}-runtime

  check-unused-dependencies:
    if: github.ref == 'refs/heads/master'
    runs-on: moonbeam-release-medium
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: master
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly-2026-04-01
          components: rust-src
          targets: wasm32v1-none, wasm32-unknown-unknown
      - name: Install required dependencies
        run: |
          sudo apt-get install -y libprotobuf-dev protobuf-compiler libclang-dev
          cargo +nightly-2026-04-01 install cargo-udeps
      - name: Check for unused dependencies
        run: |
          # There may be false negatives/positives
          # In case of false positives, check https://github.com/est31/cargo-udeps?tab=readme-ov-file#ignoring-some-of-the-dependencies
          cargo +nightly-2026-04-01 udeps --workspace --features runtime-benchmarks,evm-tracing,try-runtime --all-targets

  build-runtimes-for-twiggy:
    if: github.ref == 'refs/heads/master'
    runs-on:
      labels: bare-metal
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: master
          persist-credentials: false
      - name: Cargo build
        uses: ./.github/workflow-templates/cargo-build
        with:
          features: metadata-hash
      - name: Upload runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtimes
          path: runtimes
      - name: Upload uncompressed runtimes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: uncompressed-runtimes
          path: uncompressed-runtimes

  check-wasm-size:
    if: github.ref == 'refs/heads/master'
    name: Check WASM runtimes with Twiggy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: ["build-runtimes-for-twiggy"]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: master
          persist-credentials: false
      # With rustup's nice new toml format, we just need to run rustup show to install the toolchain
      # https://github.com/actions-rs/toolchain/issues/126#issuecomment-782989659
      - name: Setup Rust toolchain
        run: |
          rustup override unset
          rustup show
      - name: Download Twiggy
        run: cargo install twiggy --locked
      - name: Download current master runtimes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtimes
          path: runtimes-current-master
          merge-multiple: true
      - name: Download current master uncompressed runtimes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: uncompressed-runtimes
          path: uncompressed-runtimes-current-master
          merge-multiple: true
      - name: Check current master runtimes size
        run: |
          CURRENT_MOONBASE=$(du -k runtimes-current-master/* | awk '/moonbase_runtime/ {print $1}')
          CURRENT_MOONBEAM=$(du -k runtimes-current-master/* | awk '/moonbeam_runtime/ {print $1}')
          CURRENT_MOONRIVER=$(du -k runtimes-current-master/* | awk '/moonriver_runtime/ {print $1}')
          {
            echo "CURRENT_MOONBASE=$CURRENT_MOONBASE"
            echo "CURRENT_MOONBEAM=$CURRENT_MOONBEAM"
            echo "CURRENT_MOONRIVER=$CURRENT_MOONRIVER"
          } >> "$GITHUB_ENV"
      - name: Fetch latest release tag
        run: |
          LATEST_RELEASE_TAG=$(gh api repos/moonbeam-foundation/moonbeam/releases --paginate --jq '.[] | select(.tag_name | test("^runtime-\\d+$")) | .tag_name' | sort -V | tail -n 1)
          echo "LATEST_RELEASE_TAG=$LATEST_RELEASE_TAG" >> "$GITHUB_ENV"
          echo "$LATEST_RELEASE_TAG"
      - name: Download latest release runtimes
        run: |
          gh release download "$LATEST_RELEASE_TAG" -R moonbeam-foundation/moonbeam -p "moonbeam-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" -p "moonbase-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" -p "moonriver-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" --dir runtimes-latest-release
      - name: Check latest release runtimes size
        run: |
          LATEST_MOONBASE=$(du -k runtimes-latest-release/* | awk '/moonbase-runtime/ {print $1}')
          LATEST_MOONBEAM=$(du -k runtimes-latest-release/* | awk '/moonbeam-runtime/ {print $1}')
          LATEST_MOONRIVER=$(du -k runtimes-latest-release/* | awk '/moonriver-runtime/ {print $1}')
          {
            echo "LATEST_MOONBASE=$LATEST_MOONBASE"
            echo "LATEST_MOONBEAM=$LATEST_MOONBEAM"
            echo "LATEST_MOONRIVER=$LATEST_MOONRIVER"
          } >> "$GITHUB_ENV"
      - name: Create Twiggy diff reports
        run: |
          mkdir -p twiggy-diff-reports
          twiggy diff -n 100 --format json "runtimes-latest-release/moonbase-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" "uncompressed-runtimes-current-master/moonbase_runtime.wasm" > twiggy-diff-reports/twiggy_diff_moonbase.json
          twiggy diff -n 100 --format json "runtimes-latest-release/moonbeam-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" "uncompressed-runtimes-current-master/moonbeam_runtime.wasm" > twiggy-diff-reports/twiggy_diff_moonbeam.json
          twiggy diff -n 100 --format json "runtimes-latest-release/moonriver-runtime-${LATEST_RELEASE_TAG#runtime-}.wasm" "uncompressed-runtimes-current-master/moonriver_runtime.wasm" > twiggy-diff-reports/twiggy_diff_moonriver.json
      - name: Upload Twiggy diff reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: twiggy-diff-reports
          path: twiggy-diff-reports
      - name: Compare runtime sizes
        run: |
          MOONBASE_DIFF=$((CURRENT_MOONBASE - LATEST_MOONBASE))
          MOONBEAM_DIFF=$((CURRENT_MOONBEAM - LATEST_MOONBEAM))
          MOONRIVER_DIFF=$((CURRENT_MOONRIVER - LATEST_MOONRIVER))

          get_status() {
            local size=$1
            local diff=$2
            if [ "$size" -gt 3000 ]; then
              echo "too large"
            elif [ "$diff" -gt 0 ]; then
              echo "increased"
            else
              echo "ok"
            fi
          }

          {
            echo "### WASM runtime size check"
            echo ""
            echo "Compared to latest release (${LATEST_RELEASE_TAG})"
            echo ""
            echo "Moonbase runtime: ${CURRENT_MOONBASE} KB ($( [ "$MOONBASE_DIFF" -eq 0 ] && echo "no changes" || echo "$( [ "$MOONBASE_DIFF" -gt 0 ] && echo "+" )${MOONBASE_DIFF} KB")) - $(get_status "$CURRENT_MOONBASE" "$MOONBASE_DIFF")"
            echo ""
            echo "Moonbeam runtime: ${CURRENT_MOONBEAM} KB ($( [ "$MOONBEAM_DIFF" -eq 0 ] && echo "no changes" || echo "$( [ "$MOONBEAM_DIFF" -gt 0 ] && echo "+" )${MOONBEAM_DIFF} KB")) - $(get_status "$CURRENT_MOONBEAM" "$MOONBEAM_DIFF")"
            echo ""
            echo "Moonriver runtime: ${CURRENT_MOONRIVER} KB ($( [ "$MOONRIVER_DIFF" -eq 0 ] && echo "no changes" || echo "$( [ "$MOONRIVER_DIFF" -gt 0 ] && echo "+" )${MOONRIVER_DIFF} KB")) - $(get_status "$CURRENT_MOONRIVER" "$MOONRIVER_DIFF")"
          } > runtime_size_report.md
          cat runtime_size_report.md
