[package]
name = "pallet-xcm-weight-trader"
authors = { workspace = true }
description = "A pallet to trade weight for XCM execution"
edition = "2021"
version = "0.1.0"

[dependencies]
log = { workspace = true }
serde = { workspace = true }

# Substrate
frame-support = { workspace = true }
frame-system = { workspace = true }
parity-scale-codec = { workspace = true }
scale-info = { workspace = true, features = [ "derive" ] }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }

# Polkadot
xcm = { workspace = true }
xcm-executor = { workspace = true }
xcm-runtime-apis = { workspace = true }

# Moonbeam
xcm-primitives = { workspace = true }

# Benchmarks
frame-benchmarking = { workspace = true, optional = true }

[dev-dependencies]
frame-benchmarking = { workspace = true, features = [ "std" ] }
pallet-balances = { workspace = true, features = [ "insecure_zero_ed", "std" ] }
sp-tracing = { workspace = true, features = [ "std" ] }

[features]
default = [ "std" ]
std = [ "frame-benchmarking?/std", "frame-support/std", "frame-system/std", "log/std", "pallet-balances/std", "parity-scale-codec/std", "scale-info/std", "serde/std", "sp-core/std", "sp-io/std", "sp-runtime/std", "sp-std/std", "sp-tracing/std", "xcm-executor/std", "xcm-primitives/std", "xcm-runtime-apis/std", "xcm/std" ]
runtime-benchmarks = [ "frame-benchmarking", "frame-benchmarking/runtime-benchmarks", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks", "pallet-balances/runtime-benchmarks", "sp-runtime/runtime-benchmarks", "xcm-executor/runtime-benchmarks", "xcm-primitives/runtime-benchmarks", "xcm-runtime-apis/runtime-benchmarks", "xcm/runtime-benchmarks" ]
try-runtime = [ "frame-support/try-runtime", "frame-system/try-runtime", "pallet-balances/try-runtime", "sp-runtime/try-runtime" ]
