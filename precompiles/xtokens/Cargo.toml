[package]
name = "pallet-evm-precompile-xtokens"
authors = { workspace = true }
description = "A Precompile to make xtokens accessible to pallet-evm"
edition = "2021"
version = "0.1.0"

[dependencies]

# Moonbeam
account = { workspace = true }
pallet-xcm-transactor = { workspace = true }
xcm-primitives = { workspace = true }

# Substrate
frame-support = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-weights = { workspace = true }

# Frontier
fp-evm = { workspace = true }
frame-system = { workspace = true }
pallet-evm = { workspace = true, features = [ "forbid-evm-reentrancy" ] }
precompile-utils = { workspace = true, features = [ "codec-xcm" ] }

# Polkadot / XCM
pallet-xcm = { workspace = true }
xcm = { workspace = true }

[dev-dependencies]

# Moonbeam
moonbeam-tests-primitives = { workspace = true }
precompile-utils = { workspace = true, features = [ "testing" ] }

# Substrate
pallet-balances = { workspace = true, features = [ "std" ] }
pallet-timestamp = { workspace = true }
parity-scale-codec = { workspace = true, features = [ "max-encoded-len" ] }
scale-info = { workspace = true, features = [ "derive" ] }
sp-io = { workspace = true }

# Cumulus
cumulus-primitives-core = { workspace = true }

# Polkadot
pallet-xcm = { workspace = true }
xcm-builder = { workspace = true }
xcm-executor = { workspace = true }

[features]
default = [ "std" ]
std = [ "account/std", "cumulus-primitives-core/std", "fp-evm/std", "frame-support/std", "frame-system/std", "moonbeam-tests-primitives/std", "pallet-balances/std", "pallet-evm/std", "pallet-timestamp/std", "pallet-xcm-transactor/std", "pallet-xcm/std", "parity-scale-codec/std", "precompile-utils/std", "scale-info/std", "sp-core/std", "sp-io/std", "sp-runtime/std", "sp-std/std", "sp-weights/std", "xcm-builder/std", "xcm-executor/std", "xcm-primitives/std", "xcm/std" ]
runtime-benchmarks = [ "cumulus-primitives-core/runtime-benchmarks", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks", "moonbeam-tests-primitives/runtime-benchmarks", "pallet-balances/runtime-benchmarks", "pallet-evm/runtime-benchmarks", "pallet-timestamp/runtime-benchmarks", "pallet-xcm-transactor/runtime-benchmarks", "pallet-xcm/runtime-benchmarks", "sp-runtime/runtime-benchmarks", "xcm-builder/runtime-benchmarks", "xcm-executor/runtime-benchmarks", "xcm-primitives/runtime-benchmarks", "xcm/runtime-benchmarks" ]
