[package]
name = "moonbeam-runtime-common"
authors = { workspace = true }
description = "Common code shared between runtimes"
edition = "2021"
homepage = "https://moonbeam.network"
license = "GPL-3.0-only"
version = "0.8.0-dev"

[package.metadata.cargo-udeps.ignore]
# Used inside macro-generated code in apis.rs (impl_runtime_apis!)
normal = [ "pallet-author-slot-filter" ]

[dependencies]
log = { workspace = true }

# Moonbeam
ethereum = { workspace = true }
moonbeam-core-primitives = { workspace = true }
moonbeam-runtime-api-primitives = { workspace = true }
pallet-migrations = { workspace = true }
pallet-moonbeam-foreign-assets = { workspace = true }
pallet-xcm-transactor = { workspace = true }
pallet-xcm-weight-trader = { workspace = true }

# Substrate
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-balances = { workspace = true }
pallet-identity = { workspace = true, optional = true }
pallet-message-queue = { workspace = true }
pallet-treasury = { workspace = true }
pallet-xcm = { workspace = true }
pallet-xcm-bridge = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }

# Moonkit
pallet-author-inherent = { workspace = true }
pallet-author-slot-filter = { workspace = true }

# Polkadot
xcm = { workspace = true }
xcm-builder = { workspace = true }

# Parity
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }

account = { workspace = true }

# Cumulus
cumulus-primitives-core = { workspace = true, default-features = false }

[features]
std = [ "account/std", "cumulus-primitives-core/std", "ethereum/std", "frame-support/std", "frame-system/std", "log/std", "moonbeam-core-primitives/std", "moonbeam-runtime-api-primitives/std", "pallet-author-inherent/std", "pallet-author-slot-filter/std", "pallet-balances/std", "pallet-identity/std", "pallet-message-queue/std", "pallet-migrations/std", "pallet-moonbeam-foreign-assets/std", "pallet-treasury/std", "pallet-xcm-bridge/std", "pallet-xcm-bridge/std", "pallet-xcm-transactor/std", "pallet-xcm-weight-trader/std", "pallet-xcm/std", "parity-scale-codec/std", "scale-info/std", "sp-core/std", "sp-io/std", "sp-runtime/std", "sp-std/std", "xcm-builder/std", "xcm/std" ]
runtime-benchmarks = [ "cumulus-primitives-core/runtime-benchmarks", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks", "pallet-author-inherent/runtime-benchmarks", "pallet-author-slot-filter/runtime-benchmarks", "pallet-balances/runtime-benchmarks", "pallet-identity/runtime-benchmarks", "pallet-message-queue/runtime-benchmarks", "pallet-migrations/runtime-benchmarks", "pallet-moonbeam-foreign-assets/runtime-benchmarks", "pallet-treasury/runtime-benchmarks", "pallet-xcm-bridge/runtime-benchmarks", "pallet-xcm-transactor/runtime-benchmarks", "pallet-xcm-weight-trader/runtime-benchmarks", "pallet-xcm/runtime-benchmarks", "sp-runtime/runtime-benchmarks", "xcm-builder/runtime-benchmarks", "xcm/runtime-benchmarks" ]
try-runtime = [ "frame-support/try-runtime", "frame-system/try-runtime", "pallet-author-inherent/try-runtime", "pallet-author-slot-filter/try-runtime", "pallet-balances/try-runtime", "pallet-identity?/try-runtime", "pallet-message-queue/try-runtime", "pallet-migrations/try-runtime", "pallet-moonbeam-foreign-assets/try-runtime", "pallet-treasury/try-runtime", "pallet-xcm-bridge/try-runtime", "pallet-xcm-transactor/try-runtime", "pallet-xcm-weight-trader/try-runtime", "pallet-xcm/try-runtime", "sp-runtime/try-runtime" ]
