[settings]
provider = "native"

[relaychain]
default_command = "polkadot"
default_args = [
    "-lruntime::bridge-grandpa=trace"
]
# NOTE: We use rococo-local because the stable2512 polkadot binary no longer
# ships kusama-local as a built-in chain spec (it moved to the
# polkadot-fellows/runtimes chain-spec-generator). This is safe for bridge
# testing: all relay chain variants share the same header format and GRANDPA
# protocol. The bridge relayer commands (e.g. "kusama-to-moonbeam") refer
# to pallet instance names on the parachain, not the actual relay chain type.
chain = "rococo-local"

[[relaychain.nodes]]
name = "alice"
validator = true
rpc_port = 9901
args = [
    "--blocks-pruning=archive",
    "--state-pruning=archive",
]

[[relaychain.nodes]]
name = "bob"
validator = true

[[parachains]]
id = 2_023
chain = "moonriver-local"
cumulus_based = true

[parachains.genesis.runtimeGenesis.config.authorFilter]
eligibleCount = 1

[[parachains.collators]]
name = "alith"
command = "moonbeam"
rpc_port = 8801
args = [
    "--no-hardware-benchmarks",
    "--no-telemetry",
    "-lruntime::bridge-grandpa=trace",
    "--pool-type=fork-aware"
]

[types.Header]
number = "u64"
parent_hash = "Hash"
post_state = "Hash"
